services:
  postgres:
    image: postgres:16-alpine
    container_name: mealplanner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mealplanner
      POSTGRES_PASSWORD: mealplanner
      POSTGRES_DB: mealplanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealplanner -d mealplanner"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: postgres:16-alpine
    container_name: mealplanner-migrate
    restart: "no"
    environment:
      PGHOST: postgres
      PGUSER: mealplanner
      PGPASSWORD: mealplanner
      PGDATABASE: mealplanner
    volumes:
      - ./src/db/migrations:/migrations:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        for migration in /migrations/*.sql; do
          echo "Applying $$migration"
          psql -v ON_ERROR_STOP=1 -f "$$migration"
        done
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
    container_name: mealplanner-app
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: true
        format: raw
    ports:
      - "192.168.1.213:3102:3000"
    environment:
      DATABASE_URL: postgresql://mealplanner:mealplanner@postgres:5432/mealplanner
      AUTH_URL: https://food.rozwinswojbiznes.pl
      NEXTAUTH_URL: https://food.rozwinswojbiznes.pl
      AUTH_TRUST_HOST: "true"
      APP_URL: https://food.rozwinswojbiznes.pl
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e 'fetch(\"http://127.0.0.1:3000/api/health\").then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  backup:
    image: postgres:16-alpine
    container_name: mealplanner-backup
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: mealplanner
      PGPASSWORD: mealplanner
      PGDATABASE: mealplanner
    volumes:
      - backup_data:/backups
    entrypoint: |
      /bin/sh -c 'while true; do
        pg_dump -Fc > /backups/mealplanner-$$(date +%Y%m%d-%H%M%S).dump;
        find /backups -name "*.dump" -mtime +7 -delete;
        sleep 86400;
      done'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
  backup_data:
