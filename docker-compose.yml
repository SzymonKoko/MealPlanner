services:
  postgres:
    image: postgres:16-alpine
    container_name: mealplanner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mealplanner
      POSTGRES_PASSWORD: mealplanner
      POSTGRES_DB: mealplanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealplanner"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: mealplanner-app
    restart: unless-stopped
    ports:
      - "3102:3000"
    environment:
      DATABASE_URL: postgresql://mealplanner:mealplanner@postgres:5432/mealplanner
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-in-production-32chars}
      APP_URL: ${APP_URL:-https://food.rozwinswojbiznes.pl}
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER:-}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID:-}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET:-}
      DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS:-false}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  backup:
    image: postgres:16-alpine
    container_name: mealplanner-backup
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: mealplanner
      PGPASSWORD: mealplanner
      PGDATABASE: mealplanner
    volumes:
      - backup_data:/backups
    entrypoint: |
      /bin/sh -c 'while true; do
        pg_dump -Fc > /backups/mealplanner-$$(date +%Y%m%d-%H%M%S).dump;
        find /backups -name "*.dump" -mtime +7 -delete;
        sleep 86400;
      done'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
  backup_data:
